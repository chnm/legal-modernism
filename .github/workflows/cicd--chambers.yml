name: Build & Publish chambers Docker Image

on:
  push:
    branches: [
      "main",
      "issue156"
    ]
    paths:
      - "chambers/**"
      - "go/**"
      - "go.mod"
      - "go.sum"

jobs:

  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/legal-modernism-chambers
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: chambers/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    uses: chnm/.github/.github/workflows/docker--deploy.yml@main
    needs: [build-and-publish]
    secrets: inherit
    with:
      website-devl-fqdn: "chambers.legalmodernism.org"
      website-prod-fqdn: "chambers.legalmodernism.org"

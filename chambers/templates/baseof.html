{{define "baseof"}}
<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Chambers{{end}}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bs-primary: #6f42c1;
            --bs-primary-rgb: 111, 66, 193;
            --bs-link-color: #6f42c1;
            --bs-link-color-rgb: 111, 66, 193;
            --bs-link-hover-color: #4a2a84;
            --bs-link-hover-color-rgb: 74, 42, 132;
        }
        body { font-family: 'IBM Plex Sans', sans-serif; }
        a { color: var(--bs-link-color); }
        a:hover { color: var(--bs-link-hover-color); }
        .btn-primary {
            --bs-btn-bg: #6f42c1;
            --bs-btn-border-color: #6f42c1;
            --bs-btn-hover-bg: #5a32a3;
            --bs-btn-hover-border-color: #4a2a84;
            --bs-btn-active-bg: #4a2a84;
            --bs-btn-active-border-color: #3f2470;
        }
        .btn-accent {
            background-color: #f0c531;
            border-color: #f0c531;
            color: #3d2a00;
        }
        .btn-accent:hover {
            background-color: #dbb320;
            border-color: #d0a91c;
            color: #3d2a00;
        }
        .border-bottom { border-bottom-color: #c9b3e6 !important; }
        .bg-light { background-color: #f5f0fc !important; }
        mark { background: #f0c531; }
        code { color: #8b5cf6; }
        {{block "styles" .}}{{end}}
    </style>
</head>
<body>
    <div class="container-fluid py-3">
        {{block "nav" .}}{{end}}
        <div class="mb-3"></div>
        {{block "content" .}}{{end}}
    </div>
</body>
</html>
{{end}}
